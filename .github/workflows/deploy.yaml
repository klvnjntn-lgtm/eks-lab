name: "EKS Deployment"

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  terraform:
    name: "Terraform EKS"
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4 
        with:
          version: 'latest'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::304188066409:role/GitHubAction-Terraform-Role
          aws-region: ap-southeast-1

      # --- 1. INFRA LAYER ---
      - name: Terraform Init (Infra)
        run: terraform -chdir=layers/infra init -upgrade

      - name: Terraform Apply (Infra)
        run: terraform -chdir=layers/infra apply -auto-approve

      # --- 2. KUBECONFIG ---
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region ap-southeast-1 --name kj-eks-prod

      # --- 3. ADDONS LAYER (Step A: CRDs/Helm) ---
      - name: Terraform Init (Addons)
        run: terraform -chdir=layers/addons init -upgrade

      - name: Terraform Apply (Helm Only)
        run: terraform -chdir=layers/addons apply -auto-approve

      - name: Wait for CRDs
        run: sleep 60

      # --- 4. ADDONS LAYER (Step B: Final) ---
      - name: Terraform Apply (Final Addons)
        run: terraform -chdir=layers/addons apply -auto-approve

      - name: Debug EKS Connection
        if: always()
        run: |
          aws eks update-kubeconfig --region ap-southeast-1 --name kj-eks-prod
          echo "=== NODE STATUS ==="
          kubectl get nodes --show-labels || echo "Nodes not ready"
          echo "=== POD STATUS ==="
          kubectl get pods -A

  build-app:
    name: "Build & Push App"
    runs-on: ubuntu-latest
    needs: terraform 
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::304188066409:role/GitHubAction-Terraform-Role
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: "guestbook-ui"
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest 

      - name: Force Restart Deployment
        run: |
          aws eks update-kubeconfig --region ap-southeast-1 --name kj-eks-prod
          kubectl rollout restart deployment guestbook-ui -n default || echo "Deployment not found yet"