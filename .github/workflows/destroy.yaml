name: "EKS Destroy"

on:
  workflow_dispatch: # Manual trigger only for safety

jobs:
  terraform-destroy:
    name: "Terraform EKS Destroy"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::304188066409:role/GitHubAction-Terraform-Role
          aws-region: ap-southeast-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region ap-southeast-1 --name kj-eks-prod || true

      - name: Pro-Level Cleanup
        run: |
          aws eks update-kubeconfig --region ap-southeast-1 --name kj-eks-prod || true

          echo "--- Phase 1: Graceful Application Shutdown ---"
          kubectl get deployments -A -o jsonpath='{range .items[*]}kubectl scale deployment/{.metadata.name} -n {.metadata.namespace} --replicas=0{"\n"}{end}' | bash

          echo "--- Phase 2: Triggering Cloud Provider Deletions ---"
          # Deleting Ingress triggers the ALB Controller to call the AWS API to delete the ALB
          kubectl delete ingress --all -A --timeout=60s || true
          # Deleting LB services cleans up Network Load Balancers
          kubectl delete service --all -A --field-selector type=LoadBalancer --timeout=60s || true

          echo "--- Phase 3: The Dependency Wait Loop ---"
          # Pro move: Don't just sleep; check if the ALB is actually gone
          for i in {1..20}; do
            ALB_ARN=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?contains(LoadBalancerName, 'kj-eks-prod')].LoadBalancerArn" --output text)
            if [ -z "$ALB_ARN" ]; then
              echo "ALB successfully deleted by Controller."
              break
            fi
            echo "Waiting for ALB to be deleted... (Attempt $i/20)"
            sleep 15
          done

          echo "--- Phase 4: Final State Cleanup ---"
          # Adjusted -chdir to match our new root layout
          terraform -chdir=layers/addons state rm 'module.karpenter.kubectl_manifest.karpenter_node_class[0]' || true
          terraform -chdir=layers/addons state rm 'module.karpenter.kubectl_manifest.karpenter_node_pool[0]' || true
          
          # Give AWS 30 more seconds to finish detaching Security Groups
          sleep 30

      # --- ADDONS LAYER ---
      # No longer needs to guess relative paths from ./eks-project
      - name: Init Addons
        run: terraform -chdir=layers/addons init -upgrade

      - name: Destroy Addons
        run: terraform -chdir=layers/addons destroy -auto-approve

      # --- INFRASTRUCTURE LAYER ---
      - name: Init Infra
        run: terraform -chdir=layers/infra init -upgrade

      - name: Destroy Infra
        run: terraform -chdir=layers/infra destroy -auto-approve