apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.grafana.com/helm/charts'
    targetRevision: 8.5.0  # Or latest stable version
    chart: grafana
    helm:
      values: |
        adminPassword: "Grafana123"
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: ALL
        persistence:
          enabled: true
          storageClassName: "gp3" # Adjust based on your EKS storage class
          size: 10Gi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true